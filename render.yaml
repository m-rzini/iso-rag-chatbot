services:
  # --- Backend (FastAPI) ---
  - type: web
    name: iso-rag-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false          # set to your frontend URL, e.g. https://iso-rag-frontend.onrender.com
      - key: HF_HOME
        value: /tmp/huggingface

  # --- Frontend (React static site) ---
  - type: static
    name: iso-rag-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # set to your backend URL, e.g. https://iso-rag-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
